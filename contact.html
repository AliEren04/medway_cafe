<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medway Café - Contact Us</title>
  <meta name="description"
    content="Lovely Coffee & Breakfast in Medway. Visit us for the best coffee, delicious and price-wise best breakfast, delicious flexible priced food and drinks.">
  <link rel="preload" href="./mainstyle.css" as="style" onload="this.rel='stylesheet'">
  <noscript>
    <link rel="stylesheet" href="./mainstyle.css">
  </noscript>
  <link rel="icon" type="image/png" href="./assets/icon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="./assets/icon/favicon.svg" />
  <link rel="shortcut icon" href="./assets/icon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/icon/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="MedwayCafe" />
  <link rel="manifest" href="./assets/icon/site.webmanifest" />
  <script>
    window.addEventListener("pageshow", () => {
      document.getElementById("contact-form").reset();
    });
  </script>
</head>

<body>
  <header>
    <nav>
      <nav class="nav-container">
        <a class="nav-item">

          <picture>
            <source srcset="./assets/avif/logo.avif" type="image/avif">
            <source srcset="./assets/webp/logo.webp" type="image/webp">
            <img class="logo" src="./assets/jpeg/logo.jpg" alt="logo" width="800" height="800">
          </picture>

        </a>
        <h1 class="main-header">Medway Café</h1>
        <a class="nav-item-desktop" href="./index.html">Home</a>
        <a class="nav-item-desktop" href="./about.html">About US</a>
        <a class="nav-item-desktop" href="./contact.html">Contact</a>
        <a class="nav-item-desktop" href="./assets/menu.pdf" target="_blank">Menu</a>
        <a class="nav-item-desktop" href="https://www.facebook.com/medwaycafe/?locale=en_GB">Our Facebook Page </a>
        <a class="nav-item-mobile" href="javascript:void(0);" onclick="navHandler()">
          <picture>
            <source srcset="./assets/avif/hamburger.avif" type="image/avif" />
            <source srcset="./assets/webp/hamburger.webp" type="image/webp" />
            <img src="./assets/jpeg/hamburger.jpg" alt="mobile menu open icon" loading="eager" decoding="async"
              width="30" height="30" />
          </picture>
        </a>
      </nav>
    </nav>
    <div id="overlay-mobile" class="overlay-mobile">
      <a id="mobile-menu" href="javascript:void(0);" onclick="navHandler()">
        <picture>
          <source srcset="./assets/avif/x-icon.avif" type="image/avif" />
          <source srcset="./assets/webp/x-icon.webp" type="image/webp" />
          <img class="x-icon" src="./assets/jpeg/x-icon.jpg" alt="mobile menu close icon" loading="eager"
            decoding="async" width="48" height="48" />
        </picture>
      </a>
      <a id="mobile-item1" class="item-mobile" href="./index.html">Home</a>
      <a id="mobile-item2" class="item-mobile" href="./about.html">About US</a>
      <a id="mobile-item3" class="item-mobile" href="./contact.html">Contact</a>
      <a id="mobile-item4" class="item-mobile" href="./assets/menu.pdf" target="_blank">Menu</a>
      <a id="mobile-item5" class="item-mobile" href="https://www.facebook.com/medwaycafe/?locale=en_GB">Our Facebook
        Page </a>
    </div>
  </header>
  <section class="contact-section">
    <div class="contact-container">
      <h2>Contact Us</h2>
      <form id="contact-form" action="https://api.web3forms.com/submit" method="post" ">
        <input type="hidden" name="access_key" value="46d14891-42aa-4c9c-95aa-edd73a898818">
        <div class="input-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Enter your name" required>
        </div>
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>
        <div class="input-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Enter your message" required></textarea>
        </div>
        <div class="h-captcha" data-captcha="true"></div>
        <button type="submit" class="submit-btn">Send Message</button>
      </form>
    </div>
  </section>
  <footer class="footer">
    <div class="footer-content">
      <p class="footer-text">
        &copy; <span id="footer-year"></span> Medway Café. All Rights
        Reserved.
      </p>
    </div>
  </footer>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "CafeOrCoffeeShop",
      "name": "Medway Café",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "181 High Street Gillingham ",
        "addressLocality": "Medway",
        "addressRegion": "Kent",
        "postalCode": "ME7 4HG",
        "addressCountry": "GB"
      },
      "telephone": "01634450589",
      "url": "https://www.medway-cafe.co.uk"
    }
    </script>
  <script src="https://web3forms.com/client/script.js" async defer></script>
  <script src="script.js" defer></script>
  <script>
    window.addEventListener('load', () => {
      // Load Motion JS
      import('https://cdn.jsdelivr.net/npm/motion@12.37.0/dist/motion.js').then(() => {
        initMotion(); 
      });
    });
  </script>
</body>

</html>
